services:
  - type: web
    name: rate-limiter-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd test_backend && python -c "import uvicorn; uvicorn.run('main:app', host='0.0.0.0', port=8000, reload=False)"
    envVars:
      - key: REDIS_URL
        fromService: redis
      - key: PYTHON_VERSION
        value: "3.14"
    redis:
      - name: rate-limiter-redis
        plan: free